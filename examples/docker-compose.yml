services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: filtrx
      POSTGRES_PASSWORD: filtrx
      POSTGRES_DB: filtrx
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filtrx"]
      interval: 2s
      timeout: 3s
      retries: 20

  app:
    build:
      context: ..
      dockerfile: examples/Dockerfile
    environment:
      DATABASE_URL: postgres://filtrx:filtrx@db:5432/filtrx?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
