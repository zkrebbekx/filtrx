name: Feature request
description: Suggest an operator, holder, dialect or API improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you express today, or what is awkward?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API
      description: How might it look at the call site?
      render: go
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
